name: CD

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Build Docker image
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_cmamsys
        run: |
          VERSION=$(echo $GITHUB_REF | sed 's/refs\/tags\///' | sed 's/refs\/heads\///')
          if [ "$VERSION" = "main" ]; then
            VERSION=$(git rev-parse --short HEAD)
          fi
          echo "IMAGE_TAG=$VERSION" >> $GITHUB_ENV
          echo "Building Docker image with tag: $VERSION"
          docker build --no-cache --build-arg DATABASE_URL="$DATABASE_URL" -t ghcr.io/yogdunana/cmamsys:$VERSION .

      - name: Login to GitHub Container Registry
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push Docker image
        run: docker push ghcr.io/yogdunana/cmamsys:$IMAGE_TAG

      - name: Tag and push as latest
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        run: |
          docker tag ghcr.io/yogdunana/cmamsys:$IMAGE_TAG ghcr.io/yogdunana/cmamsys:latest
          docker push ghcr.io/yogdunana/cmamsys:latest

      - name: Output image info
        run: |
          echo "✅ Docker image built and pushed successfully!"
          echo "📦 Image: ghcr.io/yogdunana/cmamsys:$IMAGE_TAG"
          if [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ]; then
            echo "📦 Latest: ghcr.io/yogdunana/cmamsys:latest"
          fi
