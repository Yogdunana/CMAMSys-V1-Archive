name: CD

on:
  push:
    branches: [main]
    tags: ['v*']

# GitHub Pro 支持完整的 CI/CD 功能
# 如需启用 Code Scanning，请在仓库设置中启用

# 配置 Actions 权限（GitHub Pro 必需）
permissions:
  contents: read
  packages: write
  deployments: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Generate changelog
        run: |
          echo "## 📦 Release ${{ github.ref_name }}" > changelog.md
          echo "" >> changelog.md
          echo "### 🚀 What's New" >> changelog.md
          echo "" >> changelog.md
          echo "Changes in this release:" >> changelog.md
          git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "HEAD^")..HEAD >> changelog.md || echo "- Initial release" >> changelog.md
          echo "" >> changelog.md
          echo "### 🔧 Deployment Instructions" >> changelog.md
          echo "" >> changelog.md
          echo "#### Option 1: Using Docker Compose (Recommended)" >> changelog.md
          echo "\`\`\`bash" >> changelog.md
          echo "git clone https://github.com/Yogdunana/CMAMSys.git" >> changelog.md
          echo "cd CMAMSys" >> changelog.md
          echo "git checkout ${{ github.ref_name }}" >> changelog.md
          echo "cp .env.docker.example .env" >> changelog.md
          echo "# Edit .env with your configuration" >> changelog.md
          echo "docker compose up -d" >> changelog.md
          echo "\`\`\`" >> changelog.md
          echo "" >> changelog.md
          echo "#### Option 2: Manual Docker Build" >> changelog.md
          echo "\`\`\`bash" >> changelog.md
          echo "docker build -t cmamsys:${{ github.ref_name }} ." >> changelog.md
          echo "docker run -p 3000:3000 --env-file .env cmamsys:${{ github.ref_name }}" >> changelog.md
          echo "\`\`\`" >> changelog.md
          echo "" >> changelog.md
          echo "#### Option 3: Using Deployment Script" >> changelog.md
          echo "\`\`\`bash" >> changelog.md
          echo "chmod +x scripts/manual-deploy.sh" >> changelog.md
          echo "./scripts/manual-deploy.sh production" >> changelog.md
          echo "\`\`\`" >> changelog.md
          echo "" >> changelog.md
          echo "### 📚 Documentation" >> changelog.md
          echo "- [Deployment Guide](https://github.com/Yogdunana/CMAMSys/blob/main/docs/MANUAL_DEPLOYMENT.md)" >> changelog.md
          echo "- [API Documentation](https://github.com/Yogdunana/CMAMSys/blob/main/API.md)" >> changelog.md
          echo "" >> changelog.md
          echo "### ⚠️ Important Notes" >> changelog.md
          echo "- Make sure to configure all required environment variables" >> changelog.md
          echo "- Run database migrations: \`docker compose exec -T app npx prisma migrate deploy\`" >> changelog.md
          echo "- Ensure PostgreSQL is running and accessible" >> changelog.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref_name }}
          body_path: changelog.md
          draft: false
          prerelease: false

      - name: Notify Release
        run: |
          echo "🎉 Release ${{ github.ref_name }} created successfully!"
          echo "📦 View release: https://github.com/Yogdunana/CMAMSys/releases/tag/${{ github.ref_name }}"
