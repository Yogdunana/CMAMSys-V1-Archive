# Redis Configuration for CMAMSys
# Redis 配置文件

# 网络配置
bind 127.0.0.1
port 6379
protected-mode yes

# 持久化配置
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# 内存配置
maxmemory 256mb
maxmemory-policy allkeys-lru

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# 日志配置
loglevel notice
logfile ""

# 客户端配置
timeout 0
tcp-keepalive 300

# 安全配置
requirepass ""

# 数据库数量
databases 16
