name: Test Docker Build

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test Docker Commands
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check Docker
        run: |
          echo "Docker version:"
          docker --version
          echo "Docker info:"
          docker info

      - name: Test Docker build
        run: |
          echo "Testing simple Docker build..."
          echo "FROM alpine:latest" > Dockerfile.test
          echo "RUN echo 'Hello World'" >> Dockerfile.test
          docker build -f Dockerfile.test -t test-image .
          docker images | grep test-image

      - name: Test GitHub Container Registry login
        run: |
          echo "Testing GitHub Container Registry login..."
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker logout ghcr.io

      - name: Clean up
        if: always()
        run: |
          docker rmi test-image || true
          rm -f Dockerfile.test || true
