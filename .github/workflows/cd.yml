name: CD

on:
  push:
    branches: [main]
    tags: ['v*']

# GitHub Pro 支持完整的 CI/CD 功能
# 如需启用 Code Scanning，请在仓库设置中启用

# 配置 Actions 权限（GitHub Pro 必需）
permissions:
  contents: read
  packages: write
  deployments: write

jobs:
  build-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      LOG_FILE_PATH: /tmp/app.log

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build application
        run: pnpm run build

      - name: Build Docker image
        run: |
          docker build -t cmamsys:latest .

      - name: Login to GitHub Container Registry
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Tag and push Docker image
        run: |
          docker tag cmamsys:latest ghcr.io/yogdunana/cmamsys:latest
          docker push ghcr.io/yogdunana/cmamsys:latest

      - name: Tag with SHA and push
        run: |
          docker tag cmamsys:latest ghcr.io/yogdunana/cmamsys:${{ github.sha }}
          docker push ghcr.io/yogdunana/cmamsys:${{ github.sha }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-docker
    environment:
      name: production
      url: https://cmamsys.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/cmamsys
            docker compose pull
            docker compose up -d
            docker image prune -f

      - name: Run database migrations
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/cmamsys
            docker compose exec -T app npx prisma migrate deploy

      - name: Notify deployment success
        if: success()
        run: |
          echo "🚀 Deployment successful!"
          echo "Environment: Production"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.base_ref == 'develop'
    environment:
      name: staging
      url: https://staging.cmamsys.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/cmamsys-staging
            docker compose pull
            docker compose up -d
            docker image prune -f

  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    env:
      LOG_FILE_PATH: /tmp/app.log

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build application
        run: pnpm run build

      - name: Generate changelog
        id: changelog
        run: |
          echo "## Release Notes" > changelog.md
          echo "" >> changelog.md
          echo "Changes in this release:" >> changelog.md
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> changelog.md
          echo "" >> changelog.md
          echo "### Docker Image" >> changelog.md
          echo "To build and push the image manually, run:" >> changelog.md
          echo "\`\`\`bash" >> changelog.md
          echo "docker build -t ghcr.io/yogdunana/cmamsys:${{ github.ref_name }} ." >> changelog.md
          echo "echo \${GITHUB_TOKEN} | docker login ghcr.io -u \${{ github.actor }} --password-stdin" >> changelog.md
          echo "docker push ghcr.io/yogdunana/cmamsys:${{ github.ref_name }}" >> changelog.md
          echo "\`\`\`" >> changelog.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref }}
          body_path: changelog.md
          draft: false
          prerelease: false

      - name: Notify Docker Image Build Instructions
        run: |
          echo "🎉 Release ${{ github.ref }} created successfully!"
          echo ""
          echo "📦 To build and push the Docker image, run:"
          echo "   docker build -t ghcr.io/yogdunana/cmamsys:${{ github.ref_name }} ."
          echo "   echo \${GITHUB_TOKEN} | docker login ghcr.io -u \${{ github.actor }} --password-stdin"
          echo "   docker push ghcr.io/yogdunana/cmamsys:${{ github.ref_name }}"
