version: "3.7"

x-sentry-defaults: &sentry-defaults
  restart: unless-stopped
  depends_on:
    - redis
    - postgres
    - smtp
  env_file: .env
  environment:
    SENTRY_CONF: 'sentry.conf.py'
    SENTRY_SECRET_KEY: ${SENTRY_SECRET_KEY}
    SENTRY_URL_PREFIX: ${SENTRY_URL_PREFIX}
    SENTRY_SERVER_EMAIL: ${SENTRY_SERVER_EMAIL}
    SENTRY_EMAIL_HOST: smtp
    SENTRY_EMAIL_PORT: 25
    SENTRY_EMAIL_USER: ""
    SENTRY_EMAIL_PASSWORD: ""
    SENTRY_EMAIL_USE_TLS: "false"
    SENTRY_REDIS_HOST: redis
    SENTRY_REDIS_PORT: 6379
    SENTRY_POSTGRES_HOST: postgres
    SENTRY_POSTGRES_PORT: 5432
    SENTRY_POSTGRES_USER: ${SENTRY_DB_USER}
    SENTRY_POSTGRES_PASSWORD: ${SENTRY_DB_PASSWORD}
    SENTRY_POSTGRES_DBNAME: ${SENTRY_DB_NAME}
    SENTRY_OPTIONS_SERVER_EMAIL: ${SENTRY_SERVER_EMAIL}

services:
  smtp:
    image: tianon/exim4
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: ${SENTRY_DB_NAME:-sentry}
      POSTGRES_USER: ${SENTRY_DB_USER:-sentry}
      POSTGRES_PASSWORD: ${SENTRY_DB_PASSWORD:-sentry}
    volumes:
      - sentry-postgres:/var/lib/postgresql/data

  web:
    <<: *sentry-defaults
    image: sentry:24.12.1
    command:
      - "run"
      - "web"
    ports:
      - 9000:9000
    volumes:
      - sentry-data:/var/lib/sentry/files
      - ./sentry.conf.py:/etc/sentry/sentry.conf.py:ro

  cron:
    <<: *sentry-defaults
    image: sentry:24.12.1
    command:
      - "run"
      - "cron"

  worker:
    <<: *sentry-defaults
    image: sentry:24.12.1
    command:
      - "run"
      - "worker"

volumes:
  sentry-postgres:
  sentry-data:
