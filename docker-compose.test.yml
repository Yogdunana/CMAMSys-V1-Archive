version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.test
    image: cmamsys-test:latest
    container_name: cmamsys-test-app
    ports:
      - "5000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://test:test@localhost:5432/test_cmamsys
      JWT_SECRET: test-jwt-secret-for-ci-build-only-32-char
      REFRESH_TOKEN_SECRET: test-refresh-token-secret-for-ci-build-32
      ENCRYPTION_KEY: test-encryption-key-for-ci-build-only-32-chars
      CSRF_SECRET: test-csrf-secret-for-ci-build-only-32-chars
      SESSION_SECRET: test-session-secret-for-ci-build-only-32-chars
      LOG_FILE_PATH: /tmp/app.log
      PORT: 3000
