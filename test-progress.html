<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务进度测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-10">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">任务详情页面进度显示测试</h1>

        <!-- 模拟前端状态 -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-lg font-semibold mb-4">模拟前端状态</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">任务标题</label>
                    <div class="text-gray-900">城市共享单车投放优化问题</div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">整体状态</label>
                    <div class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-green-100 text-green-800">
                        已完成
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">进度</label>
                    <div class="flex items-center gap-2">
                        <div class="flex-1 bg-gray-200 rounded-full h-2">
                            <div class="bg-blue-600 h-2 rounded-full" style="width: 100%"></div>
                        </div>
                        <span class="text-sm text-gray-600">100%</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 数据库中的实际状态 -->
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-lg font-semibold mb-4">数据库中的实际状态</h2>
            <div id="db-status" class="space-y-2 text-sm">
                <div class="text-gray-500">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        // 模拟从数据库获取的数据
        const dbStatus = {
            id: 'cmlhktmot0000uguh5r4wpvgy',
            problemTitle: '城市共享单车投放优化问题',
            overallStatus: 'COMPLETED',
            progress: 100
        };

        // 显示数据库状态
        const statusDiv = document.getElementById('db-status');
        statusDiv.innerHTML = `
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <span class="font-medium">任务ID:</span>
                    <span class="text-gray-700">${dbStatus.id}</span>
                </div>
                <div>
                    <span class="font-medium">任务标题:</span>
                    <span class="text-gray-700">${dbStatus.problemTitle}</span>
                </div>
                <div>
                    <span class="font-medium">整体状态:</span>
                    <span class="text-green-600 font-medium">${dbStatus.overallStatus}</span>
                </div>
                <div>
                    <span class="font-medium">进度:</span>
                    <span class="text-blue-600 font-medium">${dbStatus.progress}%</span>
                </div>
            </div>
            <div class="mt-4 p-4 bg-green-50 rounded-lg border border-green-200">
                <div class="flex items-center gap-2 text-green-700">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                    </svg>
                    <span class="font-medium">✅ 数据库状态正确！</span>
                </div>
                <p class="mt-2 text-sm text-green-600">
                    如果前端显示的进度与数据库一致（100%），则状态同步正常。
                    如果前端显示的不是 100%，请检查前端状态轮询逻辑。
                </p>
            </div>
        `;
    </script>
</body>
</html>
