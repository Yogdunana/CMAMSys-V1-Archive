version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: cmamsys-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cmamsys
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cmamsys_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cmamsys-network

  # Redis（可选，用于缓存和会话管理）
  redis:
    image: redis:7-alpine
    container_name: cmamsys-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - cmamsys-network

  # CMAMSys 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cmamsys-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-cmamsys_password}@postgres:5432/cmamsys
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CSRF_SECRET: ${CSRF_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      APP_NAME: ${APP_NAME:-CMAMSys}
      APP_URL: ${APP_URL:-http://localhost:5000}
      APP_PORT: 5000
      BCRYPT_ROUNDS: 14
      MAX_LOGIN_ATTEMPTS: 5
      LOCKOUT_DURATION_MS: 900000
      SESSION_MAX_AGE: 604800000
      API_DEFAULT_VERSION: v1
      ALLOWED_ORIGINS: ${APP_URL:-http://localhost:5000}
      ALLOWED_METHODS: GET,POST,PUT,DELETE,PATCH,OPTIONS
      ALLOWED_HEADERS: Content-Type,Authorization,X-CSRF-Token
      MAX_FILE_SIZE: 10485760
      ALLOWED_FILE_TYPES: .pdf,.doc,.docx,.txt,.csv,.xlsx,.xls,.png,.jpg,.jpeg,.gif
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cmamsys-network

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: cmamsys-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - cmamsys-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  cmamsys-network:
    driver: bridge
