name: CD

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build application
        env:
          NODE_ENV: production
          DATABASE_URL: postgresql://test:test@localhost:5432/test_cmamsys
          JWT_SECRET: test-jwt-secret-for-ci-build-only-32-char
          REFRESH_TOKEN_SECRET: test-refresh-token-secret-for-ci-build-32
          ENCRYPTION_KEY: test-encryption-key-for-ci-build-only-32-chars
          CSRF_SECRET: test-csrf-secret-for-ci-build-only-32-chars
          SESSION_SECRET: test-session-secret-for-ci-build-only-32-chars
          LOG_FILE_PATH: /tmp/app.log
        run: pnpm run build

      - name: Check Dockerfile
        run: |
          echo "Checking Dockerfile..."
          ls -la Dockerfile
          cat Dockerfile | head -20

      - name: Build Docker image
        run: |
          VERSION=$(echo $GITHUB_REF | sed 's/refs\/tags\///' | sed 's/refs\/heads\///')
          if [ "$VERSION" = "main" ]; then
            VERSION=$(git rev-parse --short HEAD)
          fi
          echo "Building Docker image with tag: $VERSION"
          echo "IMAGE_TAG=$VERSION" >> $GITHUB_ENV
          docker build --no-cache -t ghcr.io/yogdunana/cmamsys:$VERSION . 2>&1 | tee build.log

      - name: Check Docker image
        if: success()
        run: |
          docker images | grep cmamsys

      - name: Login to GitHub Container Registry
        if: success()
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push Docker image
        if: success()
        run: docker push ghcr.io/yogdunana/cmamsys:$IMAGE_TAG

      - name: Tag and push as latest
        if: success() && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        run: |
          docker tag ghcr.io/yogdunana/cmamsys:$IMAGE_TAG ghcr.io/yogdunana/cmamsys:latest
          docker push ghcr.io/yogdunana/cmamsys:latest

      - name: Output image info
        if: always()
        run: |
          echo "Docker image build completed!"
          if [ "$?" -eq 0 ]; then
            echo "Image: ghcr.io/yogdunana/cmamsys:$IMAGE_TAG"
            echo "Latest: ghcr.io/yogdunana/cmamsys:latest"
          else
            echo "Build failed. Check logs for details."
          fi
